<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <!-- Vertical lines -->
      <path d="M 40 0 L 40 40" fill="none" stroke="rgba(0,128,255,0.2)" stroke-width="0.5"/>
      <path d="M 0 0 L 0 40" fill="none" stroke="rgba(0,128,255,0.2)" stroke-width="0.5"/>
      <!-- Horizontal lines -->
      <path d="M 0 40 L 40 40" fill="none" stroke="rgba(0,128,255,0.2)" stroke-width="0.5"/>
      <path d="M 0 0 L 40 0" fill="none" stroke="rgba(0,128,255,0.2)" stroke-width="0.5"/>
      <!-- Diagonal lines -->
      <path d="M 0 0 L 40 40" fill="none" stroke="rgba(0,128,255,0.15)" stroke-width="0.5"/>
      <path d="M 40 0 L 0 40" fill="none" stroke="rgba(0,128,255,0.15)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="100" height="100" fill="url(#grid)" />
</svg> 